name: release-desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-15-intel
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Validate tagged commit version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bun run release:verify-tag

      - name: Validate updater signing credentials
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          FLOW_MERGE_UPDATE_PUBLIC_KEY: ${{ vars.FLOW_MERGE_UPDATE_PUBLIC_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            Write-Error "Missing repository secret TAURI_SIGNING_PRIVATE_KEY."
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($env:FLOW_MERGE_UPDATE_PUBLIC_KEY)) {
            Write-Error "Missing repository variable FLOW_MERGE_UPDATE_PUBLIC_KEY."
            exit 1
          }

          $testFile = Join-Path $PWD ".release-sign-test"
          Set-Content -LiteralPath $testFile -Value "flow-merge-sign-test" -NoNewline

          try {
            bun tauri signer sign $testFile | Out-Null
          }
          finally {
            Remove-Item -LiteralPath $testFile -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath "$testFile.sig" -ErrorAction SilentlyContinue
          }

      - name: Configure remote frontend for desktop
        shell: pwsh
        env:
          FLOW_MERGE_DESKTOP_FRONTEND_DIST: ${{ vars.FLOW_MERGE_DESKTOP_FRONTEND_DIST }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:FLOW_MERGE_DESKTOP_FRONTEND_DIST)) {
            Write-Error "Missing repository variable FLOW_MERGE_DESKTOP_FRONTEND_DIST."
            exit 1
          }

          $configPath = Join-Path $PWD "src-tauri/tauri.conf.json"
          $config = Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json -AsHashtable
          $config.build.frontendDist = $env:FLOW_MERGE_DESKTOP_FRONTEND_DIST
          $config.build.beforeBuildCommand = $null
          $config | ConvertTo-Json -Depth 100 | Set-Content -LiteralPath $configPath

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          FLOW_MERGE_UPDATE_REPOSITORY: ${{ github.repository }}
          FLOW_MERGE_UPDATE_PUBLIC_KEY: ${{ vars.FLOW_MERGE_UPDATE_PUBLIC_KEY }}
          FLOW_MERGE_DESKTOP_FRONTEND_DIST: ${{ vars.FLOW_MERGE_DESKTOP_FRONTEND_DIST }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Flow Merge ${{ github.ref_name }}
          releaseBody: Release automatica para Flow Merge.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  promote-internal:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Fetch release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          mkdir -p .release-assets
          gh api repos/${{ github.repository }}/releases/tags/$VERSION_TAG > .release-assets/release.json
          gh release download "$VERSION_TAG" --dir .release-assets

      - name: Build latest.json
        env:
          UPDATER_RELEASE_JSON_PATH: .release-assets/release.json
          UPDATER_ASSET_DIR: .release-assets
          UPDATER_OUTPUT_PATH: .release-assets/latest.json
        run: bun run updater:manifest

      - name: Publish internal channel manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view channel-internal >/dev/null 2>&1 || gh release create channel-internal --title "Channel internal" --notes "Mutable updater feed for the internal channel." --latest=false
          gh release upload channel-internal .release-assets/latest.json --clobber
